# Cursor Provider Configuration
name: "Cursor (Editor Agent)"
id: "cursor.editor"
transport: "cli"
priority: 5
quality: 80
cost: 3  # 1-10 scale
timeouts:
  connect: 15
  read: 120
  write: 30
retry:
  max_retries: 2
  backoff_base: 2.0
  backoff_max: 30.0
authentication:
  type: cli_session
  env_var: ""
  location: "session"
capabilities:
  - code_generation
  - code_editing
  - file_operations
  - code_review
limits:
  max_tokens: 64000
  max_concurrent: 2
  rate_limit: 100
  rate_limit_period: "minute"
workspace:
  default_model: "cursor-small"
environment:
  required_python: "3.8"
  required_memory_mb: 256
